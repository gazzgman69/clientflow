name: Tenant Guard

on:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: "0 2 * * *" # nightly @ 02:00 UTC

jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      # Required at runtime; if missing we skip cleanly
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Skip if CI secrets missing
        shell: bash
        run: |
          if [[ -z "${SESSION_SECRET}" || -z "${DATABASE_URL}" ]]; then
            echo "skipped (ci-secrets): SESSION_SECRET or DATABASE_URL not set"
            exit 0
          fi

      - name: Run Tenant Guard
        run: npm run tenant:guard
